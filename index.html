<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Biblioteca · Colégio Príncipe da Paz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="page">

    <header class="header">
      <div class="crest">
        <svg class="crest__crown" viewBox="0 0 64 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M4 44 L4 22 L14 30 L22 12 L32 26 L42 12 L50 30 L60 22 L60 44 Z" stroke="currentColor" stroke-width="3" stroke-linejoin="round" fill="none"/>
          <line x1="4" y1="44" x2="60" y2="44" stroke="currentColor" stroke-width="3"/>
        </svg>
      </div>
      <p class="header__eyebrow">Colégio Príncipe da Paz</p>
      <h1 class="header__title">Biblioteca</h1>
      <p class="header__subtitle">App para reservar horários para estudar, trabalhar em grupo ou dar aula.</p>
    </header>

    <main class="content">

      <section class="card card--form" aria-labelledby="form-title">
        <div class="card__ribbon">Ficha de reserva</div>
        <h2 id="form-title" class="card__title">Reservar um horário</h2>

        <form id="booking-form" novalidate>

          <label class="field">
            <span class="field__label">Seu nome</span>
            <input type="text" id="name" name="name" placeholder="Nome completo" required autocomplete="name">
          </label>

          <label class="field">
            <span class="field__label">Motivo</span>
            <select id="purpose" name="purpose" required>
              <option value="" disabled selected>Escolha um motivo</option>
              <option value="estudar">Estudar</option>
              <option value="trabalho">Trabalho em grupo</option>
              <option value="aula">Dar aula</option>
              <option value="outro">Outro</option>
            </select>
          </label>

          <label class="field field--other" id="purpose-other-field" hidden>
            <span class="field__label">Qual motivo?</span>
            <input type="text" id="purpose-other" name="purpose-other" placeholder="Descreva o motivo">
          </label>

          <label class="field">
            <span class="field__label">Data</span>
            <input type="date" id="date" name="date" required>
          </label>

          <div class="field-row">
            <label class="field">
              <span class="field__label">Início</span>
              <input type="time" id="start-time" name="start-time" required>
            </label>
            <label class="field">
              <span class="field__label">Fim</span>
              <input type="time" id="end-time" name="end-time" required>
            </label>
          </div>

          <p class="form-message" id="form-message" role="alert" hidden></p>

          <button type="submit" class="seal-button" id="submit-button">
            <svg class="seal-button__icon" viewBox="0 0 64 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M4 44 L4 22 L14 30 L22 12 L32 26 L42 12 L50 30 L60 22 L60 44 Z" stroke="currentColor" stroke-width="4" stroke-linejoin="round" fill="none"/>
              <line x1="4" y1="44" x2="60" y2="44" stroke="currentColor" stroke-width="4"/>
            </svg>
            <span>Confirmar reserva</span>
          </button>

        </form>
      </section>

      <section class="card card--list" aria-labelledby="list-title">
        <div class="card__header-row">
          <div>
            <div class="card__ribbon card__ribbon--muted">Registro</div>
            <h2 id="list-title" class="card__title">Próximos horários</h2>
          </div>
          <button class="refresh-button" id="refresh-button" title="Atualizar lista" aria-label="Atualizar lista">↻</button>
        </div>

        <div id="bookings-status" class="list-status">Carregando horários…</div>
        <div id="bookings-list" class="bookings-list"></div>
      </section>

    </main>

    <footer class="footer">
      <p>Colégio Príncipe da Paz · Biblioteca</p>
    </footer>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
